name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write       # create releases + upload assets
  pages: write          # deploy to GitHub Pages
  id-token: write       # OIDC for Pages

jobs:
  # ── Resolve published mod list from publish.json ───────────────────────────
  config:
    name: Read publish.json
    runs-on: ubuntu-latest
    outputs:
      mods: ${{ steps.read.outputs.mods }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: echo "mods=$(jq -c '.mods' publish.json)" >> $GITHUB_OUTPUT

  # ── Build published mods ───────────────────────────────────────────────────
  build-mods:
    name: Build ${{ matrix.mod }}
    needs: config
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mod: ${{ fromJson(needs.config.outputs.mods) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Build
        run: dotnet build mods/${{ matrix.mod }} -c Release /p:CI=true /p:NoInstall=1 /p:GameDir="$GITHUB_WORKSPACE/game-refs"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dll-${{ matrix.mod }}
          path: mods/${{ matrix.mod }}/bin/Release/${{ matrix.mod }}.dll

  # ── Publish GitHub Release (tags only) ────────────────────────────────────
  release:
    name: Publish release
    needs: build-mods
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dll-*
          merge-multiple: true
          path: dist/

      - name: Create release and upload DLLs
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dll
          generate_release_notes: true

  # ── Build and deploy site ──────────────────────────────────────────────────
  deploy-site:
    name: Deploy site
    needs: [config, build-mods]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dll-*
          merge-multiple: true
          path: dist/

      - name: Patch download URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
        run: |
          if [[ "$REF" == refs/tags/* ]]; then
            TAG="${REF#refs/tags/}"
          else
            TAG=$(gh release list --repo "$REPO" --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          fi

          if [[ -z "$TAG" ]]; then
            echo "No release tag found — keeping placeholder download URLs"
            exit 0
          fi

          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          echo "Patching download URLs to $BASE"

          node -e "
            const fs = require('fs');
            const published = JSON.parse(fs.readFileSync('publish.json', 'utf8')).mods;
            const base = '$BASE';
            const slugToDll = {
              cairncoop:        'CairnCoop',
              cairnroutes:      'CairnRoutes',
              cairnfreeroam:    'CairnFreeRoam',
              cairnforage:      'CairnForage',
              cairncarryweight: 'CairnCarryWeight',
              cairnaccessories: 'CairnAccessories',
              cairnnocutscenes: 'CairnNoCutscenes',
              cairnarchipelago: 'CairnArchipelago',
              cairntools:       'CairnTools',
              cairnapi:         'CairnAPI',
              cairndevtools:    'CairnDevTools',
            };
            const publishedSet = new Set(published.map(d => d.toLowerCase()));
            let src = fs.readFileSync('site/src/data/mods.ts', 'utf8');
            for (const [slug, dll] of Object.entries(slugToDll)) {
              if (!publishedSet.has(slug)) continue;
              const url = base + '/' + dll + '.dll';
              const re = new RegExp('(slug:\\\\s*[\"\\']' + slug + '[\"\\'][\\\\s\\\\S]{0,800}?download:\\\\s*)TODO_DOWNLOAD', 'g');
              src = src.replace(re, (m, pre) => pre + JSON.stringify(url));
            }
            fs.writeFileSync('site/src/data/mods.ts', src);
          "

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install site deps
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - id: deploy
        uses: actions/deploy-pages@v4
